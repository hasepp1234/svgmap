<html lang="ja">
<head>
<meta charset="UTF-8">

<title>サバゲーフィールド全国データベース（プロトタイプ）</title>
<style>
  :root {
    --primary: #1f3864;
    --accent: #2e5b8a;
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --border: #dfe3ea;
    --text: #24303d;
    --muted: #6b7684;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
  }
  header h1 { margin: 0 0 6px; font-size: 24px; }
  header p { margin: 0; font-size: 13px; opacity: 0.85; }
  .banner {
    background: #fff8e1;
    color: #7a5c00;
    text-align: center;
    font-size: 12px;
    padding: 6px 12px;
    border-bottom: 1px solid #f0e0a0;
  }
  .controls {
    max-width: 1000px;
    margin: 18px auto 0;
    padding: 0 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .controls input, .controls select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
  }
  .controls input { flex: 1 1 220px; }
  .controls select { flex: 0 1 150px; }
  .controls button {
    flex: 0 0 auto;
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #searchBtn { background: var(--accent); color: #fff; }
  #searchBtn:hover { background: var(--primary); }
  #resetBtn { background: #e9edf3; color: var(--text); border: 1px solid var(--border) !important; }
  #resetBtn:hover { background: #dde3ec; }
  .count-bar {
    max-width: 1000px;
    margin: 10px auto 0;
    padding: 0 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .grid {
    max-width: 1000px;
    margin: 12px auto 40px;
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(31,56,100,0.12); transform: translateY(-2px); }
  .card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
  }
  .tag.outdoor { background: #e6f4ea; color: #2a7a3f; }
  .tag.indoor { background: #eef0fb; color: #4a4ab5; }
  .tag.region-kanto { background: linear-gradient(135deg, #dbeafe, #93c5fd); color: #1e40af; }
  .tag.region-kansai { background: linear-gradient(135deg, #ffedd5, #fdba74); color: #9a3412; }
  .tag.region-chubu { background: linear-gradient(135deg, #dcfce7, #86efac); color: #166534; }
  .tag.region-kyushu { background: linear-gradient(135deg, #f3e8ff, #d8b4fe); color: #6b21a8; }
  .tag.region-hokkaido-tohoku { background: linear-gradient(135deg, #ffe4e6, #fda4af); color: #9f1239; }
  .tag.region-chugoku { background: linear-gradient(135deg, #cffafe, #67e8f9); color: #155e75; }
  .tag.region-shikoku { background: linear-gradient(135deg, #fef9c3, #fde047); color: #854d0e; }
  .tag.region-okinawa { background: linear-gradient(135deg, #ccfbf1, #5eead4); color: #0f766e; }
  .card h3 { margin: 4px 0 6px; font-size: 16px; color: var(--primary); }
  .card .loc { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .card .price { font-size: 13px; font-weight: 600; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 14px;
  }
  .overlay {
    position: fixed; inset: 0; background: rgba(20,28,40,0.5);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 10;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; max-width: 480px; width: 100%;
    padding: 24px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { color: var(--primary); margin-top: 0; }
  .modal dl { margin: 14px 0; }
  .modal dt { font-size: 12px; color: var(--muted); margin-top: 10px; }
  .modal dd { margin: 2px 0 0; font-size: 14px; }
  .modal .close-btn {
    display: inline-block; margin-top: 16px; padding: 9px 16px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px;
  }
  .modal a { color: var(--accent); }
  footer {
    text-align: center; font-size: 12px; color: var(--muted); padding: 20px 0 30px;
  }
  footer .footer-nav a { color: var(--muted); margin: 0 8px; }
  footer .footer-note { margin-top: 8px; }
</style>
</head>

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const regionSel = document.getElementById('region');
const typeSel = document.getElementById('type');
const rentalSel = document.getElementById('rental');
const searchBtn = document.getElementById('searchBtn');
const resetBtn = document.getElementById('resetBtn');
const countBar = document.getElementById('countBar');
const overlay = document.getElementById('overlay');
const modalBody = document.getElementById('modalBody');

function uniq(arr) { return [...new Set(arr)]; }

function populateSelect(sel, values) {
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}
populateSelect(regionSel, uniq(FIELDS.map(f => f.region)));
populateSelect(typeSel, uniq(FIELDS.map(f => f.type)));

function tagClass(type) {
  if (type.includes('屋外')) return 'outdoor';
  if (type.includes('屋内')) return 'indoor';
  return '';
}

const REGION_CLASS = {
  '関東': 'region-kanto',
  '関西': 'region-kansai',
  '中部': 'region-chubu',
  '九州': 'region-kyushu',
  '北海道・東北': 'region-hokkaido-tohoku',
  '中国': 'region-chugoku',
  '四国': 'region-shikoku',
  '沖縄': 'region-okinawa',
};
function regionClass(region) { return REGION_CLASS[region] || ''; }

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const region = regionSel.value;
  const type = typeSel.value;
  const rental = rentalSel.value;

  const filtered = FIELDS.filter(f => {
    if (region && f.region !== region) return false;
    if (type && f.type !== type) return false;
    if (rental) {
      const hasRental = f.rental && f.rental !== '要確認' && f.rental !== '';
      if (!hasRental) return false;
    }
    if (q) {
      const hay = (f.name + f.pref + f.city + f.note).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  countBar.textContent = `${filtered.length} 件 / 全 ${FIELDS.length} 件`;
  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">条件に一致するフィールドがありません</div>';
    return;
  }
  filtered.forEach(f => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="tags">
        <span class="tag ${tagClass(f.type)}">${f.type}</span>
        <span class="tag ${regionClass(f.region)}">${f.region}</span>
      </div>
      <h3>${f.name}</h3>
      <div class="loc">${f.pref} ${f.city}</div>
      <div class="price">${f.meeting_fee}</div>
    `;
    card.addEventListener('click', () => openModal(f));
    grid.appendChild(card);
  });
}

function openModal(f) {
  modalBody.innerHTML = `
    <h2>${f.name}</h2>
    <dl>
      <dt>所在地</dt><dd>${f.pref} ${f.city}</dd>
      <dt>タイプ</dt><dd>${f.type}</dd>
      <dt>定例会費用</dt><dd>${f.meeting_fee}</dd>
      <dt>定例会人数</dt><dd>${f.meeting_min}</dd>
      <dt>レンタル</dt><dd>${f.rental}</dd>
      <dt>フィールド数</dt><dd>${f.field_count}</dd>
      <dt>収容人数</dt><dd>${f.capacity}</dd>
      <dt>特徴・備考</dt><dd>${f.note || 'ー'}</dd>
      <dt>公式サイト</dt><dd>${f.url ? `<a href="${f.url}" target="_blank" rel="noopener">${f.url}</a>` : '要確認'}</dd>
      <dt>電話番号</dt><dd>${f.phone}</dd>
      <dt>最終確認日</dt><dd>${f.last_checked || '2026-07-04'}</dd>
    </dl>
    <button class="close-btn" id="closeBtn">閉じる</button>
  `;
  overlay.classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeModal);
}
function closeModal() { overlay.classList.remove('open'); }
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

function resetFilters() {
  searchInput.value = '';
  regionSel.value = '';
  typeSel.value = '';
  rentalSel.value = '';
  render();
}

[regionSel, typeSel, rentalSel].forEach(el => {
  el.addEventListener('change', render);
});
searchInput.addEventListener('input', render);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') render(); });
searchBtn.addEventListener('click', render);
resetBtn.addEventListener('click', resetFilters);

render();
</script>
